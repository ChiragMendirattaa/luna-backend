# ── Database (Supabase PostgreSQL - IPv4 Pooler) ────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ─────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ──────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

# ── App ──────────────────────────────────────────────────────────────────────
spring.application.name=luna-backend
server.port=8080

# AI microservice URL (local for now, Render URL when deployed)
ai.service.url=${AI_SERVICE_URL}
ai.service.secret=${AI_SERVICE_SECRET}

# Proactively close connections after 10 minutes (600,000 milliseconds)
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=240000